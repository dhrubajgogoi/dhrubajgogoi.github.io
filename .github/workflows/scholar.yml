name: Update Academic Stats

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        # Added 'requests' for Scopus/Inspire APIs
        run: pip install scholarly requests 

      - name: Fetch All Academic Data
        env:
          # Passes your secret key to the Python script safely
          SCOPUS_API_KEY: ${{ secrets.SCOPUS_API_KEY }} 
        run: python fetch_metrics.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add academic_stats.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update Academic stats"
          git push
